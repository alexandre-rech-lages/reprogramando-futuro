name: CD — Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

env:
  NODE_VERSION: '22'
  DOTNET_VERSION: '9.0.x'
  AZURE_RESOURCE_GROUP: 'reprogramando-futuro-rg'

jobs:
  deploy-infra:
    name: Deploy Infrastructure (Bicep)
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: .azure/main.bicep
          parameters: .azure/main.${{ github.event.inputs.environment || 'dev' }}.bicepparam
          failOnStdErr: false

  deploy-api:
    name: Deploy API to Azure App Service
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: dotnet publish apps/api/Api.csproj -c Release -o ./publish/api

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: reprogramando-futuro-${{ github.event.inputs.environment || 'dev' }}-api
          package: ./publish/api

  deploy-web:
    name: Deploy Web to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build Angular
        run: npx nx build web --configuration=production

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/apps/web/browser
          skip_app_build: true
