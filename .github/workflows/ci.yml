name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  DOTNET_VERSION: '9.0.x'

jobs:
  affected:
    name: Detect Affected Projects
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.affected.outputs.api }}
      web: ${{ steps.affected.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Check affected projects
        id: affected
        run: |
          API=$(npx nx show projects --affected --base=HEAD~1 | grep -w "api" && echo "true" || echo "false")
          WEB=$(npx nx show projects --affected --base=HEAD~1 | grep -w "web" && echo "true" || echo "false")
          echo "api=$API" >> $GITHUB_OUTPUT
          echo "web=$WEB" >> $GITHUB_OUTPUT

  build-api:
    name: Build & Test API
    runs-on: ubuntu-latest
    needs: affected
    if: needs.affected.outputs.api == 'true' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore apps/api/Api.csproj

      - name: Build
        run: dotnet build apps/api/Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test apps/api/Api.csproj --no-build -c Release

  build-web:
    name: Build & Test Web
    runs-on: ubuntu-latest
    needs: affected
    if: needs.affected.outputs.web == 'true' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npx nx build web --configuration=production

      - name: Test
        run: npx nx test web --watchAll=false

      - name: Lint
        run: npx nx lint web
